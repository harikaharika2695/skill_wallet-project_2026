<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Approval Prediction</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 5px solid #2b579a; }
        .brand { color: #555; font-size: 14px; font-weight: bold; margin-bottom: 5px; }
        h2 { text-align: center; color: #333; margin-top: 0; margin-bottom: 30px; font-weight: normal; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 12px; font-weight: bold; color: #666; text-transform: uppercase; margin-bottom: 5px; }
        select, input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; background-color: #fff; }
        select:focus, input:focus { border-color: #2b579a; outline: none; }
        .btn-container { grid-column: span 2; text-align: center; margin-top: 25px; }
        @media (max-width: 600px) { .btn-container { grid-column: span 1; } }
        button { background-color: #2b579a; color: white; border: none; padding: 12px 30px; font-size: 16px; border-radius: 4px; cursor: pointer; transition: background 0.2s; }
        button:hover { background-color: #1e3d6b; }
    </style>
</head>
<body>

<div class="container">
    <div class="brand">SmartBridge</div>
    <h2>Credit Card Approval Prediction</h2>
    
    <form action="/predict" method="POST">
        <div class="form-grid">
            <div class="form-group">
                <label for="gender">Gender</label>
                <select id="gender" name="gender" required>
                    <option value="FEMALE">FEMALE</option>
                    <option value="MALE">MALE</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="own_car">Own Car or Not</label>
                <select id="own_car" name="own_car" required>
                    <option value="YES">YES</option>
                    <option value="NO">NO</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="own_realestate">Own Realstate</label>
                <select id="own_realestate" name="own_realestate" required>
                    <option value="NO">NO</option>
                    <option value="YES">YES</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="total_income">Total Annual Income</label>
                <input type="number" id="total_income" name="total_income" value="50000" required>
            </div>
            
            <div class="form-group">
                <label for="income_type">Type of Income</label>
                <select id="income_type" name="income_type" required>
                    <option value="Pensioner">Pensioner</option>
                    <option value="Working">Working</option>
                    <option value="Commercial associate">Commercial associate</option>
                    <option value="State servant">State servant</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="education">Education</label>
                <select id="education" name="education" required>
                    <option value="Higher education">Higher education</option>
                    <option value="Secondary / secondary special">Secondary / secondary special</option>
                    <option value="Incomplete higher">Incomplete higher</option>
                    <option value="Lower secondary">Lower secondary</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="family_status">Family Status</label>
                <select id="family_status" name="family_status" required>
                    <option value="Married">Married</option>
                    <option value="Single / not married">Single / not married</option>
                    <option value="Civil marriage">Civil marriage</option>
                    <option value="Divorced">Divorced</option>
                    <option value="Widow">Widow</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="housing_type">Type of Housing</label>
                <select id="housing_type" name="housing_type" required>
                    <option value="House / apartment">House / apartment</option>
                    <option value="With parents">With parents</option>
                    <option value="Municipal apartment">Municipal apartment</option>
                    <option value="Rented apartment">Rented apartment</option>
                    <option value="Office apartment">Office apartment</option>
                </select>
            </div>
            
            <div class="btn-container">
                <button type="submit">Predict Approval Status</button>
            </div>
        </div>
    </form>
</div>

</body>
</html>
