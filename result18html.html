<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .result-card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; }
        h1 { color: #333; margin-bottom: 25px; }
        .status-text { font-size: 24px; font-weight: bold; margin-bottom: 30px; }
        .approved { color: #28a745; }
        .rejected { color: #dc3545; }
        a { display: inline-block; padding: 10px 20px; background-color: #6c757d; color: white; text-decoration: none; border-radius: 4px; }
        a:hover { background-color: #5a6268; }
    </style>
</head>
<body>

<div class="result-card">
    <h1>Evaluation Result</h1>
    
    <!-- This text changes automatically depending on the code below -->
    <div id="prediction-output" class="status-text approved">Credit Card Approved</div>
    
    <a href="index.html">Check Another Application</a>
</div>

<script>
    // DEMO CONTROL: Change this true to false to see the rejected look!
    let creditApproved = true; 

    const outputDiv = document.getElementById('prediction-output');
    if (creditApproved) {
        outputDiv.textContent = "Credit Card Approved";
        outputDiv.className = "status-text approved";
    } else {
        outputDiv.textContent = "Credit Card Rejected";
        outputDiv.className = "status-text rejected";
    }
</script>

</body>
</html>
