<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Approval Prediction</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 40px; display: flex; justify-content: center; }
        .form-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; font-weight: bold; }
        input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #28a745; border: none; color: white; font-size: 16px; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Credit Card Approval System</h2>
    <form action="/predict" method="POST">
        <!-- Add or remove input fields based on your exact model features -->
        <div class="form-group">
            <label>Feature 1 (e.g., Annual Income):</label>
            <input type="number" step="any" name="feature1" required>
        </div>
        <div class="form-group">
            <label>Feature 2 (e.g., Age):</label>
            <input type="number" step="any" name="feature2" required>
        </div>
        <div class="form-group">
            <label>Feature 3 (e.g., Credit Score):</label>
            <input type="number" step="any" name="feature3" required>
        </div>
        <div class="form-group">
            <label>Feature 4 (e.g., Debt level):</label>
            <input type="number" step="any" name="feature4" required>
        </div>
        
        <button type="submit">Predict Approval Status</button>
    </form>
</div>

</body>
</html>
